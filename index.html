<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> CPX da Maré</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-image: url('https://i.imgur.com/v1KFAWs.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .form-container {
            background-color: rgba(31, 41, 55, 0.95);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-favela {
            border-bottom: 2px solid #4b5563;
            transition: all 0.3s ease;
            background-color: rgba(17, 24, 39, 0.5);
        }
        .input-favela:focus {
            border-bottom-color: #7c3aed;
            background-color: rgba(17, 24, 39, 0.8);
        }
        .radio-tile {
            transition: all 0.3s ease;
            background-color: rgba(17, 24, 39, 0.5);
        }
        .radio-tile:hover {
            transform: translateY(-3px);
            background-color: rgba(17, 24, 39, 0.8);
        }
        input[type="radio"]:checked + .radio-tile {
            border-color: #7c3aed;
            background-color: rgba(124, 58, 237, 0.2);
        }
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%239ca3af' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="form-container rounded-xl p-8 w-full max-w-2xl">
        <div class="flex items-center mb-8">
            <i class="fas fa-home text-4xl mr-4 text-purple-400"></i>
            <div>
                <h1 class="text-3xl font-bold text-white">CPX da Maré</h1>
                <p class="text-gray-300">ByBenny_Psyco</p>
            </div>
        </div>

        <form id="cadastroForm" class="space-y-6">
            <!-- Nome -->
            <div class="relative">
                <label for="nome" class="block text-sm font-medium text-gray-200 mb-1">Nome Completo</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-3 top-3 text-gray-400"></i>
                    <input type="text" id="nome" class="input-favela w-full text-white pl-10 pr-4 py-3 border-0 border-b-2 focus:ring-0 focus:outline-none placeholder-gray-500 rounded-t" placeholder="Seu nome completo" required>
                </div>
            </div>

            <!-- Idade -->
            <div class="relative">
                <label for="idade" class="block text-sm font-medium text-gray-200 mb-1">Idade</label>
                <div class="relative">
                    <i class="fas fa-birthday-cake absolute left-3 top-3 text-gray-400"></i>
                    <input type="number" id="idade" min="0" max="120" class="input-favela w-full text-white pl-10 pr-4 py-3 border-0 border-b-2 focus:ring-0 focus:outline-none placeholder-gray-500 rounded-t" placeholder="Sua idade" required>
                </div>
            </div>

            <!-- RG -->
            <div class="relative">
                <label for="rg" class="block text-sm font-medium text-gray-200 mb-1">RG (Registro Geral)</label>
                <div class="relative">
                    <i class="fas fa-id-card absolute left-3 top-3 text-gray-400"></i>
                    <input type="text" id="rg" class="input-favela w-full text-white pl-10 pr-4 py-3 border-0 border-b-2 focus:ring-0 focus:outline-none placeholder-gray-500 rounded-t" placeholder="Número do seu RG" required>
                </div>
            </div>

            <!-- Origem -->
            <div class="relative">
                <label class="block text-sm font-medium text-gray-200 mb-3">De onde você é?</label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="block">
                        <input type="radio" name="origem" value="favela" class="hidden" required>
                        <div class="radio-tile p-4 border-2 border-gray-600 rounded-lg cursor-pointer text-center">
                            <i class="fas fa-house-user text-2xl mb-2 text-gray-300"></i>
                            <p class="text-gray-200 font-medium">Da própria comunidade</p>
                        </div>
                    </label>
                    <label class="block">
                        <input type="radio" name="origem" value="fora" class="hidden">
                        <div class="radio-tile p-4 border-2 border-gray-600 rounded-lg cursor-pointer text-center">
                            <i class="fas fa-city text-2xl mb-2 text-gray-300"></i>
                            <p class="text-gray-200 font-medium">De fora da comunidade</p>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Horário na Comunidade -->
            <div class="relative">
                <label for="horario" class="block text-sm font-medium text-gray-200 mb-1">Qual horário da pra tu brincar na comunidade?</label>
                <div class="relative">
                    <i class="fas fa-clock absolute left-3 top-3 text-gray-400"></i>
                    <select id="horario" class="input-favela w-full text-white pl-10 pr-4 py-3 border-0 border-b-2 focus:ring-0 focus:outline-none rounded-t" required>
                        <option value="" disabled selected class="text-gray-500">Selecione o horário</option>
                        <option value="manha" class="bg-gray-800">Manhã (6h - 12h)</option>
                        <option value="tarde" class="bg-gray-800">Tarde (12h - 18h)</option>
                        <option value="noite" class="bg-gray-800">Noite (18h - 23h)</option>
                        <option value="madrugada" class="bg-gray-800">Madrugada (23h - 6h)</option>
                        <option value="qualquer" class="bg-gray-800">Qualquer hora</option>
                    </select>
                </div>
            </div>

            <!-- Observações -->
            <div class="relative">
                <label for="obs" class="block text-sm font-medium text-gray-200 mb-1">Observações</label>
                <div class="relative">
                    <i class="fas fa-comment-dots absolute left-3 top-3 text-gray-400"></i>
                    <textarea id="obs" rows="3" class="input-favela w-full text-white pl-10 pr-4 py-3 border-0 border-b-2 focus:ring-0 focus:outline-none placeholder-gray-500 rounded-t" placeholder="Alguma informação adicional?"></textarea>
                </div>
            </div>

            <!-- Termos -->
            <div class="flex items-start">
                <div class="flex items-center h-5">
                    <input id="termos" name="termos" type="checkbox" class="focus:ring-purple-500 h-4 w-4 text-purple-600 border-gray-300 rounded" required>
                </div>
                <div class="ml-3 text-sm">
                    <label for="termos" class="font-medium text-gray-300">Concordo com os termos do cadastro</label>
                    <p class="text-gray-400">Seus dados serão usados apenas para fins comunitários</p>
                </div>
            </div>

            <!-- Botão -->
            <div>
                <button type="submit" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 transition-all duration-300">
                    <i class="fas fa-paper-plane mr-2"></i> Enviar Cadastro
                </button>
            </div>
        </form>

        <div class="mt-6 text-center">
            <p class="text-xs text-gray-400">CPX da Maré ©  - Todos os direitos reservados</p>
        </div>
    </div>

    <script>
        document.getElementById('cadastroForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Validar campos obrigatórios
            const nome = document.getElementById('nome').value;
            const idade = document.getElementById('idade').value;
            const rg = document.getElementById('rg').value;
            const origem = document.querySelector('input[name="origem"]:checked');
            const horario = document.getElementById('horario').value;
            const termos = document.getElementById('termos').checked;
            const obs = document.getElementById('obs').value;
            
            if (!nome || !idade || !rg || !origem || !horario || !termos) {
                alert('Por favor, preencha todos os campos obrigatórios!');
                return;
            }
            
            // Criar objeto com os dados
            const dadosCadastro = {
                nome: nome,
                idade: idade,
                rg: rg,
                origem: origem.value,
                horario: horario,
                obs: obs || "Nenhuma observação",
                data: new Date().toLocaleString()
            };
            
            // Mostrar loading no botão
            const botao = document.querySelector('button[type="submit"]');
            const textoOriginal = botao.innerHTML;
            botao.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Enviando...';
            botao.disabled = true;
            
            try {
                // Enviar para o webhook do Discord com embed personalizado
                const response = await fetch('https://discordapp.com/api/webhooks/1372845592505487381/NTPR2fXq2NoURGeAGdJZUt9oUo_iR6qUJAGMqCMHggfgpNw0S1iQx5cPxgjCdFReT7KR', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        embeds: [{
                            title: "📝 Novo Cadastro no CPX da Maré",
                            color: 16777215, // Cor branca em decimal (ffffff)
                            thumbnail: {
                                url: "https://i.imgur.com/v1KFAWs.png" // Thumbnail do servidor
                            },
                            fields: [
                                {
                                    name: "👤 Nome",
                                    value: dadosCadastro.nome,
                                    inline: true
                                },
                                {
                                    name: "🎂 Idade",
                                    value: dadosCadastro.idade,
                                    inline: true
                                },
                                {
                                    name: "🆔 RG",
                                    value: dadosCadastro.rg,
                                    inline: true
                                },
                                {
                                    name: "📍 Origem",
                                    value: dadosCadastro.origem === 'favela' ? 'Da própria comunidade' : 'De fora da comunidade',
                                    inline: true
                                },
                                {
                                    name: "⏰ Horário disponível",
                                    value: document.getElementById('horario').options[document.getElementById('horario').selectedIndex].text,
                                    inline: true
                                },
                                {
                                    name: "📝 Observações",
                                    value: dadosCadastro.obs,
                                    inline: false
                                },
                                {
                                    name: "📅 Data do cadastro",
                                    value: dadosCadastro.data,
                                    inline: false
                                }
                            ],
                            footer: {
                                text: "CPX da Maré - Sistema de Cadastro"
                            }
                        }]
                    })
                });
                
                if (response.ok) {
                    alert('Cadastro enviado com sucesso! Bem-vindo à comunidade.');
                    this.reset();
                } else {
                    throw new Error('Erro ao enviar para o Discord');
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('Ocorreu um erro ao enviar o cadastro. Por favor, tente novamente.');
            } finally {
                // Restaurar botão
                botao.innerHTML = textoOriginal;
                botao.disabled = false;
            }
        });

        // Efeitos interativos
        const inputs = document.querySelectorAll('.input-favela');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.querySelector('i').style.color = '#a78bfa';
            });
            input.addEventListener('blur', function() {
                this.parentElement.querySelector('i').style.color = '#9ca3af';
            });
        });
    </script>
</body>
</html>
